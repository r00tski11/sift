name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyzer-tests:
    name: Analyzer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and lint
        run: |
          cd analyzer
          pip install -e ".[dev]"
          ruff check src/ tests/
      - name: Test
        run: |
          cd analyzer
          pytest -v --tb=short

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -e ../analyzer
          pip install pytest bcrypt
      - name: Lint
        run: |
          cd backend
          pip install ruff
          ruff check app/
      - name: Test
        run: |
          cd backend
          pytest -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install, typecheck, and build
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit
          npx vite build
